name: Workspace Tests (Python 3.13)

on:
  push:
  pull_request:

jobs:
  workspace-tests:
    name: Workspace tests
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ git curl ca-certificates wget jq golang-go

      - name: Upgrade pip and install maturin
        run: |
          python -m pip install --upgrade pip setuptools wheel maturin

      - name: Run workspace test script
        run: |
          chmod +x ./run_workspace_tests.sh
          ./run_workspace_tests.sh

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: workspace-test-results
          path: |
            test_results.json
            test_logs/**
