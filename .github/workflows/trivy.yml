name: Trivy

# Filesystem and config scanning of the umbrella repo. Per-image scans run
# inside each submodule's own CI alongside the docker build.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "47 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Filesystem + IaC scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-fs.sarif"
          skip-dirs: "microservices,infraportal,observaboard,backend-service,projects-service,auth-service,ai-orchestrator-service,event-stream-service,go-gateway,dynamodb_prototype"

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-fs.sarif"
          category: "trivy-fs"

      - name: Trivy config (IaC) scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          format: "sarif"
          output: "trivy-config.sarif"
          skip-dirs: "microservices,infraportal,observaboard,backend-service,projects-service,auth-service,ai-orchestrator-service,event-stream-service,go-gateway,dynamodb_prototype"

      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-config.sarif"
          category: "trivy-config"
