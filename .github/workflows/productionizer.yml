name: Productionizer Agent

# Runs daily at 06:00 UTC. Loops through ALL remaining tasks in one run.
# Can also be triggered manually with optional service/gap overrides.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_service:
        description: "Service to target (e.g. accounts-service). Leave blank for auto-select."
        required: false
        default: ""
      force_gap:
        description: "Gap to fix (structured-logging | dynamic-health | error-details | audit-error-handling | error-path-tests). Leave blank for auto-select."
        required: false
        default: ""

concurrency:
  group: productionizer
  cancel-in-progress: false

jobs:
  productionize:
    name: Productionize all remaining tasks
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CARGO_TERM_COLOR: always

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────

      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure git identity
        run: |
          git config --global user.name  "productionizer-bot"
          git config --global user.email "productionizer@users.noreply.github.com"

      - name: Init microservices submodule
        run: git submodule update --init microservices

      # ── Toolchains ──────────────────────────────────────────────────────────

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust toolchain (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "microservices -> target"

      - name: Install agent Python dependencies
        run: pip install "google-genai>=1.0.0"

      # ── State ───────────────────────────────────────────────────────────────

      # state.json is committed to the repo — no cache restore needed

      # ── Database setup ──────────────────────────────────────────────────────

      - name: Create per-service test databases
        env:
          PGPASSWORD: postgres
        run: |
          for db in accounts contacts activities workflows connections opportunities reports documents spend projects audit; do
            psql -h localhost -U postgres -c "CREATE DATABASE ${db};" || true
          done

      # ── Main loop ───────────────────────────────────────────────────────────
      # Python exit codes:
      #   0 = task committed; output file written; push + PR needed
      #   1 = unrecoverable error; stop
      #   2 = task skipped (no changes needed); continue to next task
      #   3 = all tasks complete; stop

      - name: Run productionizer loop
        env:
          GOOGLE_API_KEY:  ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN:        ${{ secrets.MICROSERVICES_PAT }}
          FORCE_SERVICE:   ${{ inputs.force_service }}
          FORCE_GAP:       ${{ inputs.force_gap }}
          ALLOWED_ORIGINS: "http://localhost:5173"
          AUTH_JWT_SECRET: "dev-insecure-secret-change-me"
        run: |
          set +e  # exit codes are handled manually; don't let bash -e kill the loop
          OUTPUT=agents/productionizer/.productionizer-output.json

          # Verify PAT can reach microservices repo before starting the loop
          gh repo view rodmen07/microservices --json name,visibility
          if [ $? -ne 0 ]; then
            echo "ERROR: MICROSERVICES_PAT cannot access rodmen07/microservices"
            exit 1
          fi

          while true; do
            cd "$GITHUB_WORKSPACE/agents/productionizer"
            python main.py
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 1 ]; then
              echo "Agent reported an error. Stopping."
              exit 1
            fi

            if [ $EXIT_CODE -eq 3 ]; then
              echo "All tasks complete!"
              break
            fi

            if [ $EXIT_CODE -eq 2 ]; then
              echo "Task skipped — continuing to next task."
              rm -f "$GITHUB_WORKSPACE/$OUTPUT"
              continue
            fi

            # EXIT_CODE 0: task committed — push branch and open PR
            cd "$GITHUB_WORKSPACE"
            if [ ! -f "$OUTPUT" ]; then
              echo "WARNING: exit 0 but no output file. Continuing."
              continue
            fi

            BRANCH=$(jq -r '.branch'   "$OUTPUT")
            TITLE=$(jq  -r '.pr_title' "$OUTPUT")
            BODY=$(jq   -r '.pr_body'  "$OUTPUT")

            echo "Pushing branch: $BRANCH"
            GIT_CONFIG_GLOBAL=/dev/null git -C microservices push \
              "https://x-access-token:${GH_TOKEN}@github.com/rodmen07/microservices.git" \
              "${BRANCH}:${BRANCH}"

            echo "Opening PR..."
            gh pr create \
              --repo rodmen07/microservices \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$BODY"

            rm -f "$OUTPUT"
            echo "Task done. Moving to next."
          done

      # ── State persistence ───────────────────────────────────────────────────

      - name: Commit updated agent state
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          if ! git diff --quiet agents/productionizer/state.json; then
            git add agents/productionizer/state.json
            git commit -m "chore(productionizer): update agent state [skip ci]"
            git push
          else
            echo "state.json unchanged — nothing to commit."
          fi
