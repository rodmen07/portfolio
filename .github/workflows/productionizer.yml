name: Productionizer Agent

# Repurposed for infraportal (React/TypeScript frontend UI/UX improvements).
# 30 tasks: 10 pages x 3 gap types (loading-skeleton, empty-state, error-ux).
# Triggered manually only; cron removed since the agent manages its own state loop.

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long to run (minutes)"
        required: false
        default: "15"
        type: choice
        options:
          - "15"
          - "30"
          - "45"
          - "60"
      force_page:
        description: "Page to target (e.g. AuditPage). Leave blank for auto-select."
        required: false
        default: ""
      force_gap:
        description: "Gap to fix (loading-skeleton | empty-state | error-ux). Leave blank for auto-select."
        required: false
        default: ""

concurrency:
  group: productionizer
  cancel-in-progress: false

jobs:
  productionize:
    name: Productionize all remaining tasks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────

      - name: Checkout portfolio repo
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Configure git identity
        run: |
          git config --global user.name  "productionizer-bot"
          git config --global user.email "productionizer@users.noreply.github.com"

      - name: Clone infraportal
        env:
          INFRAPORTAL_PAT: ${{ secrets.INFRAPORTAL_PAT }}
        run: |
          CLEAN_PAT=$(printf '%s' "${INFRAPORTAL_PAT}" | tr -d '\n\r')
          git clone \
            "https://x-access-token:${CLEAN_PAT}@github.com/rodmen07/infraportal.git" \
            infraportal

      # ── Toolchains ──────────────────────────────────────────────────────────

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infraportal/package-lock.json

      - name: Install infraportal dependencies
        run: npm ci
        working-directory: infraportal

      - name: Install agent Python dependencies
        run: pip install "google-genai>=1.0.0"

      # ── Main loop ───────────────────────────────────────────────────────────
      # Python exit codes:
      #   0 = task committed; output file written; push + PR needed
      #   1 = unrecoverable error; stop
      #   2 = task skipped (no changes needed); continue to next task
      #   3 = all tasks complete; stop
      #
      # Stop conditions (besides exit codes):
      #   - Time window exhausted (DEADLINE reached)
      #   - Open PRs >= MAX_OPEN_PRS threshold

      - name: Run productionizer loop
        env:
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN:         ${{ secrets.INFRAPORTAL_PAT }}
          FORCE_PAGE:       ${{ inputs.force_page }}
          FORCE_GAP:        ${{ inputs.force_gap }}
          DURATION_MINS:    ${{ inputs.duration_minutes }}
        run: |
          set +e  # exit codes are handled manually; don't let bash -e kill the loop
          GH_TOKEN=$(printf '%s' "${GH_TOKEN}" | tr -d '\n\r')
          OUTPUT=agents/productionizer/.productionizer-output.json
          MAX_OPEN_PRS=25

          push_infraportal_main() {
            if git -C infraportal push \
              "https://x-access-token:${GH_TOKEN}@github.com/rodmen07/infraportal.git" \
              main:main; then
              return 0
            fi

            echo "main push rejected, rebasing and retrying once..."
            if ! git -C infraportal pull --rebase origin main; then
              echo "WARNING: rebase failed while retrying infraportal/main push; local commit remains unpushed. Next run will retry, but repeated failures may need manual conflict resolution."
              return 1
            fi

            git -C infraportal push \
              "https://x-access-token:${GH_TOKEN}@github.com/rodmen07/infraportal.git" \
              main:main
          }

          # Verify PAT can reach infraportal repo before starting the loop
          gh repo view rodmen07/infraportal --json name,visibility
          if [ $? -ne 0 ]; then
            echo "ERROR: INFRAPORTAL_PAT cannot access rodmen07/infraportal"
            exit 1
          fi

          # Compute deadline
          DEADLINE=$(( $(date +%s) + ${DURATION_MINS:-15} * 60 ))
          echo "Time window: ${DURATION_MINS} minutes. Deadline: $(date -d @$DEADLINE)"

          while true; do
            # ── Time check ────────────────────────────────────────────────────
            NOW=$(date +%s)
            if [ "$NOW" -ge "$DEADLINE" ]; then
              echo "Time window (${DURATION_MINS} min) exhausted. Stopping gracefully."
              break
            fi
            REMAINING=$(( ($DEADLINE - $NOW) / 60 ))
            echo "Time remaining: ${REMAINING} min"

            # ── Open PR guard ─────────────────────────────────────────────────
            OPEN_PRS=$(gh pr list --repo rodmen07/infraportal --state open --json number --jq 'length')
            if [ "${OPEN_PRS}" -ge "${MAX_OPEN_PRS}" ]; then
              echo "Open PRs (${OPEN_PRS}) >= MAX_OPEN_PRS (${MAX_OPEN_PRS}). Pausing until PRs are merged."
              break
            fi
            echo "Open PRs: ${OPEN_PRS} / ${MAX_OPEN_PRS}"

            # ── Run one task ──────────────────────────────────────────────────
            cd "$GITHUB_WORKSPACE/agents/productionizer"
            python main.py
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 1 ]; then
              echo "Agent reported an error. Stopping."
              exit 1
            fi

            if [ $EXIT_CODE -eq 3 ]; then
              echo "All tasks complete!"
              break
            fi

            if [ $EXIT_CODE -eq 2 ]; then
              echo "Task skipped — continuing to next task."
              rm -f "$GITHUB_WORKSPACE/$OUTPUT"

              # Update README even on skips to reflect progress
              cd "$GITHUB_WORKSPACE"
              git -C infraportal fetch origin main
              git -C infraportal checkout main
              if ! git -C infraportal pull --rebase origin main; then
                echo "WARNING: failed to rebase infraportal/main before README update (skip path); continuing with best-effort push."
              fi
              python agents/productionizer/update_readme.py && \
                git -C infraportal add README.md && \
                (git -C infraportal diff --cached --quiet || \
                  git -C infraportal commit -m "docs: productionizer progress update [skip ci]" && \
                  (push_infraportal_main || \
                   echo "WARNING: failed to push infraportal/main after retry (skip path).")) || true

              continue
            fi

            # EXIT_CODE 0: task committed — push branch and open PR
            cd "$GITHUB_WORKSPACE"
            if [ ! -f "$OUTPUT" ]; then
              echo "WARNING: exit 0 but no output file. Continuing."
              continue
            fi

            BRANCH=$(jq -r '.branch'   "$OUTPUT")
            TITLE=$(jq  -r '.pr_title' "$OUTPUT")
            BODY=$(jq   -r '.pr_body'  "$OUTPUT")

            echo "Pushing branch: $BRANCH"
            git -C infraportal push \
              "https://x-access-token:${GH_TOKEN}@github.com/rodmen07/infraportal.git" \
              "${BRANCH}:${BRANCH}" \
              || echo "WARNING: branch push failed — check INFRAPORTAL_PAT has Contents:write on infraportal"

            echo "Opening PR..."
            gh pr create \
              --repo rodmen07/infraportal \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$BODY" \
              || echo "WARNING: PR creation failed — check INFRAPORTAL_PAT has Pull requests:write on infraportal"

            rm -f "$OUTPUT"

            # Update infraportal README with latest progress
            echo "Updating infraportal README..."
            git -C infraportal fetch origin main
            git -C infraportal checkout main
            if ! git -C infraportal pull --rebase origin main; then
              echo "WARNING: failed to rebase infraportal/main before README update; continuing with best-effort push."
            fi
            python agents/productionizer/update_readme.py
            git -C infraportal add README.md
            if ! git -C infraportal diff --cached --quiet; then
              git -C infraportal commit -m "docs: productionizer progress update [skip ci]"
              if ! push_infraportal_main; then
                echo "WARNING: failed to push infraportal/main after retry."
              fi
              echo "README updated and pushed."
            else
              echo "README unchanged."
            fi

            echo "Task done. Moving to next."
          done

      # ── State persistence ───────────────────────────────────────────────────

      - name: Commit updated agent state
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          git fetch origin main
          # The productionizer loop may leave unstaged changes (e.g. state.json) in the
          # workspace. `git pull --rebase` refuses to run with a dirty working tree, so
          # stash any local changes first and restore them after the rebase.
          STASHED=0
          if ! git diff --quiet \
              || ! git diff --cached --quiet \
              || [ -n "$(git ls-files --others --exclude-standard)" ]; then
            if git stash push --include-untracked --message "productionizer-state-autostash" >/dev/null; then
              STASHED=1
            else
              echo "ERROR: failed to stash local changes before rebasing portfolio/main."
              exit 1
            fi
          fi
          # This branch must stay rebased before writing state so workflow persistence is deterministic.
          if ! git pull --rebase origin main; then
            echo "ERROR: failed to rebase portfolio/main before persisting state.json."
            if [ "$STASHED" -eq 1 ]; then
              git stash pop || echo "WARNING: failed to restore stashed changes after rebase failure."
            fi
            exit 1
          fi
          if [ "$STASHED" -eq 1 ]; then
            if ! git stash pop; then
              echo "ERROR: failed to restore stashed changes after rebasing portfolio/main."
              exit 1
            fi
          fi
          if ! git diff --quiet agents/productionizer/state.json; then
            git add agents/productionizer/state.json
            git commit -m "chore(productionizer): update agent state [skip ci]"
            if ! git push; then
              echo "state push rejected, rebasing and retrying once..."
              git pull --rebase origin main
              if ! git push; then
                echo "ERROR: failed to push state.json after rebase retry."
                exit 1
              fi
            fi
          else
            echo "state.json unchanged — nothing to commit."
          fi
