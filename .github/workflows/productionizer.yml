name: Productionizer Agent

# Repurposed for infraportal (React/TypeScript frontend accessibility improvements).
# 30 tasks: 10 pages x 3 gap types (aria-labels, keyboard-nav, typed-interfaces).
# Triggered manually only; cron removed since the agent manages its own state loop.

on:
  workflow_dispatch:
    inputs:
      force_page:
        description: "Page to target (e.g. AuditPage). Leave blank for auto-select."
        required: false
        default: ""
      force_gap:
        description: "Gap to fix (loading-skeleton | empty-state | error-ux). Leave blank for auto-select."
        required: false
        default: ""

concurrency:
  group: productionizer
  cancel-in-progress: false

jobs:
  productionize:
    name: Productionize all remaining tasks
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────

      - name: Checkout portfolio repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Configure git identity
        run: |
          git config --global user.name  "productionizer-bot"
          git config --global user.email "productionizer@users.noreply.github.com"

      - name: Clone infraportal
        env:
          INFRAPORTAL_PAT: ${{ secrets.INFRAPORTAL_PAT }}
        run: |
          git clone \
            "https://x-access-token:${INFRAPORTAL_PAT}@github.com/rodmen07/infraportal.git" \
            infraportal

      # ── Toolchains ──────────────────────────────────────────────────────────

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infraportal/package-lock.json

      - name: Install infraportal dependencies
        run: npm ci
        working-directory: infraportal

      - name: Install agent Python dependencies
        run: pip install "google-genai>=1.0.0"

      # ── Main loop ───────────────────────────────────────────────────────────
      # Python exit codes:
      #   0 = task committed; output file written; push + PR needed
      #   1 = unrecoverable error; stop
      #   2 = task skipped (no changes needed); continue to next task
      #   3 = all tasks complete; stop

      - name: Run productionizer loop
        env:
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
          GH_TOKEN:         ${{ secrets.INFRAPORTAL_PAT }}
          FORCE_PAGE:       ${{ inputs.force_page }}
          FORCE_GAP:        ${{ inputs.force_gap }}
        run: |
          set +e  # exit codes are handled manually; don't let bash -e kill the loop
          OUTPUT=agents/productionizer/.productionizer-output.json

          # Verify PAT can reach infraportal repo before starting the loop
          gh repo view rodmen07/infraportal --json name,visibility
          if [ $? -ne 0 ]; then
            echo "ERROR: INFRAPORTAL_PAT cannot access rodmen07/infraportal"
            exit 1
          fi

          while true; do
            cd "$GITHUB_WORKSPACE/agents/productionizer"
            python main.py
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 1 ]; then
              echo "Agent reported an error. Stopping."
              exit 1
            fi

            if [ $EXIT_CODE -eq 3 ]; then
              echo "All tasks complete!"
              break
            fi

            if [ $EXIT_CODE -eq 2 ]; then
              echo "Task skipped — continuing to next task."
              rm -f "$GITHUB_WORKSPACE/$OUTPUT"
              continue
            fi

            # EXIT_CODE 0: task committed — push branch and open PR
            cd "$GITHUB_WORKSPACE"
            if [ ! -f "$OUTPUT" ]; then
              echo "WARNING: exit 0 but no output file. Continuing."
              continue
            fi

            BRANCH=$(jq -r '.branch'   "$OUTPUT")
            TITLE=$(jq  -r '.pr_title' "$OUTPUT")
            BODY=$(jq   -r '.pr_body'  "$OUTPUT")

            echo "Pushing branch: $BRANCH"
            GIT_CONFIG_GLOBAL=/dev/null git -C infraportal push \
              "https://x-access-token:${GH_TOKEN}@github.com/rodmen07/infraportal.git" \
              "${BRANCH}:${BRANCH}"

            echo "Opening PR..."
            gh pr create \
              --repo rodmen07/infraportal \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$BODY"

            rm -f "$OUTPUT"
            echo "Task done. Moving to next."
          done

      # ── State persistence ───────────────────────────────────────────────────

      - name: Commit updated agent state
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE"
          if ! git diff --quiet agents/productionizer/state.json; then
            git add agents/productionizer/state.json
            git commit -m "chore(productionizer): update agent state [skip ci]"
            git push
          else
            echo "state.json unchanged — nothing to commit."
          fi
