    submodule: microservices

  - name: audit-service
    language: Rust / Axum
    platform: GCP Cloud Run
    role: Immutable CRM mutation log (v1.2.2)
    submodule: microservices

  - name: projects-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://projects-service-5gcrg4oiza-uc.a.run.app
