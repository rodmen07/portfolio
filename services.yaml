# Single source of truth for the InfraPortal / Portfolio service inventory.
#
# This file is consumed by:
#   - docs/ARCHITECTURE.md (manually kept in sync; see CONTRIBUTING)
#   - CI workflows that need to iterate over services
#   - Future codegen for the README service table
#
# Schema (per service):
#   name:        Repository / service identifier
#   language:    Primary implementation language / framework
#   platform:    Where the service is deployed
#   url:         Public deployment URL (omit for non-public components)
#   role:        One-line description
#   submodule:   Path of the git submodule that owns the source (if any)

services:
  # ---- InfraPortal CRM platform ----
  - name: task-api-service
    language: Rust / Axum
    platform: Fly.io
    url: https://backend-service-rodmen07-v2.fly.dev
    role: Core task CRUD, AI planner proxy, audit log
    submodule: backend-service

  - name: accounts-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://accounts-service-5gcrg4oiza-uc.a.run.app
    role: Account and tenant domain
    submodule: microservices

  - name: contacts-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://contacts-service-5gcrg4oiza-uc.a.run.app
    role: Contact and lead domain, cross-service account validation
    submodule: microservices

  - name: activities-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://activities-service-5gcrg4oiza-uc.a.run.app
    role: Activity tracking
    submodule: microservices

  - name: automation-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://automation-service-5gcrg4oiza-uc.a.run.app
    role: Automation rules
    submodule: microservices

  - name: integrations-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://integrations-service-5gcrg4oiza-uc.a.run.app
