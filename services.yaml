  - name: opportunities-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://opportunities-service-5gcrg4oiza-uc.a.run.app
    role: Sales opportunity domain
    submodule: microservices

  - name: reporting-service
    language: Rust / Axum
    platform: GCP Cloud Run
    url: https://reporting-service-5gcrg4oiza-uc.a.run.app
