# Pre-commit hooks for the umbrella repo.
#
# Install once per machine:
#   pip install pre-commit
#   pre-commit install
#
# Run on demand:
#   pre-commit run --all-files
#
# Notes
# -----
# - Per-language deep linting (clippy, mypy, golangci-lint, eslint, tflint)
#   lives inside each submodule and runs in that submodule's CI. The hooks
#   here are intentionally cheap formatting / safety checks suitable for
#   the umbrella repo where many ecosystems coexist.
# - The Dockerfile USER-directive check enforces the SOC 2 CC6.8 control
#   documented in microservices/terraform-soc2-baseline/.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, markdown, json]
        exclude: |
          (?x)^(
            .*\.lock$|
            .*\.svg$
          )$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: cargo-fmt-check
        name: cargo fmt --check (root manifests only)
        entry: bash -c 'set -e; for d in backend-service projects-service go-gateway/.. ; do if [ -f "$d/Cargo.toml" ]; then (cd "$d" && cargo fmt --all -- --check) || exit 1; fi; done'
        language: system
        pass_filenames: false
        files: '\.rs$'

      - id: dockerfile-user-directive
        name: Dockerfile USER directive (CC6.8)
        entry: bash -c 'set -e; status=0; while IFS= read -r f; do if ! grep -Eq "^[[:space:]]*USER[[:space:]]+" "$f"; then echo "Missing USER directive in $f"; status=1; fi; done < <(git ls-files "Dockerfile" "**/Dockerfile" | grep -v "^\." || true); exit $status'
        language: system
        pass_filenames: false
