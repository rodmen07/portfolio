<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="628"/>
    <line x1="200" y1="0" x2="200" y2="628"/>
    <line x1="320" y1="0" x2="320" y2="628"/>
    <line x1="440" y1="0" x2="440" y2="628"/>
    <line x1="560" y1="0" x2="560" y2="628"/>
    <line x1="680" y1="0" x2="680" y2="628"/>
    <line x1="800" y1="0" x2="800" y2="628"/>
    <line x1="920" y1="0" x2="920" y2="628"/>
    <line x1="1040" y1="0" x2="1040" y2="628"/>
    <line x1="1160" y1="0" x2="1160" y2="628"/>
  </g>

  <!-- Glow orb top-left -->
  <circle cx="120" cy="120" r="180" fill="#f59e0b" fill-opacity="0.04"/>
  <!-- Glow orb bottom-right -->
  <circle cx="1100" cy="520" r="200" fill="#2563eb" fill-opacity="0.05"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Left column — main content -->

  <!-- Version pill -->
  <rect x="60" y="52" width="110" height="28" rx="14" fill="url(#pillGrad)" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="115" y="71" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">v1.0 RELEASE</text>

  <!-- Main title -->
  <text x="60" y="145" font-family="Inter, system-ui, sans-serif" font-size="72" fill="#ffffff" font-weight="800" letter-spacing="-2">InfraPortal</text>

  <!-- Subtitle -->
  <text x="62" y="185" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94a3b8" font-weight="400">Production-grade microservices portfolio</text>

  <!-- Divider -->
  <rect x="60" y="208" width="60" height="3" rx="2" fill="url(#accent)"/>

  <!-- Feature list -->
  <g font-family="Inter, system-ui, sans-serif" font-size="17" fill="#cbd5e1">
    <!-- Item 1 -->
    <circle cx="72" cy="244" r="3" fill="#f59e0b"/>
    <text x="90" y="250">9 Rust/Axum microservices + Go API gateway</text>

    <!-- Item 2 -->
    <circle cx="72" cy="283" r="3" fill="#f59e0b"/>
    <text x="90" y="289">GitHub Actions → GCP Cloud Run via OIDC (zero secrets)</text>

    <!-- Item 3 -->
    <circle cx="72" cy="322" r="3" fill="#f59e0b"/>
    <text x="90" y="328">Client portal with GitHub + Google OAuth flows</text>

    <!-- Item 4 -->
    <circle cx="72" cy="361" r="3" fill="#f59e0b"/>
    <text x="90" y="367">React 19 frontend · Python AI orchestrator (Claude API)</text>
  </g>

  <!-- Tech tags row -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="12" font-weight="600">
    <!-- Rust -->
    <rect x="60" y="405" width="58" height="26" rx="6" fill="#b7410e" fill-opacity="0.25" stroke="#b7410e" stroke-opacity="0.5" stroke-width="1"/>
    <text x="89" y="423" fill="#fb923c" text-anchor="middle">Rust</text>

    <!-- Go -->
    <rect x="128" y="405" width="42" height="26" rx="6" fill="#00add8" fill-opacity="0.15" stroke="#00add8" stroke-opacity="0.4" stroke-width="1"/>
    <text x="149" y="423" fill="#38bdf8" text-anchor="middle">Go</text>

    <!-- Python -->
    <rect x="180" y="405" width="70" height="26" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1"/>
    <text x="215" y="423" fill="#60a5fa" text-anchor="middle">Python</text>

    <!-- GCP -->
    <rect x="260" y="405" width="50" height="26" rx="6" fill="#ea4335" fill-opacity="0.15" stroke="#ea4335" stroke-opacity="0.4" stroke-width="1"/>
    <text x="285" y="423" fill="#f87171" text-anchor="middle">GCP</text>

    <!-- SQLite -->
    <rect x="320" y="405" width="64" height="26" rx="6" fill="#0f766e" fill-opacity="0.2" stroke="#0d9488" stroke-opacity="0.4" stroke-width="1"/>
    <text x="352" y="423" fill="#2dd4bf" text-anchor="middle">SQLite</text>

    <!-- JWT -->
    <rect x="394" y="405" width="46" height="26" rx="6" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
    <text x="417" y="423" fill="#a78bfa" text-anchor="middle">JWT</text>

    <!-- React -->
    <rect x="450" y="405" width="62" height="26" rx="6" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-opacity="0.4" stroke-width="1"/>
    <text x="481" y="423" fill="#38bdf8" text-anchor="middle">React</text>
  </g>

  <!-- Right column — architecture diagram -->

  <!-- Panel background -->
  <rect x="700" y="44" width="460" height="540" rx="16" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Panel title -->
  <text x="930" y="80" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" font-weight="600" letter-spacing="0.08em">ARCHITECTURE</text>

  <!-- Layer: Frontend -->
  <rect x="780" y="96" width="300" height="44" rx="8" fill="#0ea5e9" fill-opacity="0.12" stroke="#0ea5e9" stroke-opacity="0.35" stroke-width="1"/>
  <text x="930" y="113" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#7dd3fc" text-anchor="middle" font-weight="600" letter-spacing="0.05em">FRONTEND</text>
  <text x="930" y="130" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">React 19 · GitHub Pages</text>

  <!-- Arrow -->
  <line x1="930" y1="140" x2="930" y2="160" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="930,164 925,156 935,156" fill="#334155"/>

  <!-- Layer: Gateway -->
  <rect x="780" y="165" width="300" height="44" rx="8" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-opacity="0.35" stroke-width="1"/>
  <text x="930" y="182" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle" font-weight="600" letter-spacing="0.05em">API GATEWAY</text>
  <text x="930" y="199" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">Go · Cloud Run</text>

  <!-- Arrow -->
  <line x1="930" y1="209" x2="930" y2="229" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="930,233 925,225 935,225" fill="#334155"/>

  <!-- Layer: Auth -->
  <rect x="780" y="234" width="300" height="44" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1"/>
  <text x="930" y="251" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fcd34d" text-anchor="middle" font-weight="600" letter-spacing="0.05em">AUTH SERVICE</text>
  <text x="930" y="268" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">Python · JWT · OAuth · Cloud Run</text>

  <!-- Arrow -->
  <line x1="930" y1="278" x2="930" y2="298" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="930,302 925,294 935,294" fill="#334155"/>

  <!-- Layer: Microservices -->
  <rect x="720" y="303" width="420" height="130" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1"/>
  <text x="930" y="322" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600" letter-spacing="0.05em">RUST MICROSERVICES · CLOUD RUN</text>

  <!-- Service chips -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
    <rect x="730" y="330" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="772" y="345">accounts</text>

    <rect x="824" y="330" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="866" y="345">contacts</text>

    <rect x="918" y="330" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="960" y="345">activities</text>

    <rect x="1012" y="330" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1054" y="345">projects</text>

    <rect x="730" y="362" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="772" y="377">reporting</text>

    <rect x="824" y="362" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="866" y="377">search</text>

    <rect x="918" y="362" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="960" y="377">automation</text>

    <rect x="1012" y="362" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1054" y="377">integrations</text>

    <rect x="824" y="394" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="866" y="409">opps</text>

    <rect x="918" y="394" width="84" height="22" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="960" y="409">task-api</text>
  </g>

  <!-- Arrow -->
  <line x1="930" y1="433" x2="930" y2="453" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="930,457 925,449 935,449" fill="#334155"/>

  <!-- Layer: CI/CD -->
  <rect x="780" y="458" width="300" height="44" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
  <text x="930" y="475" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle" font-weight="600" letter-spacing="0.05em">CI/CD</text>
  <text x="930" y="492" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">GitHub Actions · OIDC · Artifact Registry</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="48" fill="#000000" fill-opacity="0.3"/>
  <text x="60" y="610" font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#475569">github.com/rodmen07</text>
  <text x="1140" y="610" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155" text-anchor="end">Built with Rust · Go · Python · React</text>

  <!-- Bottom accent -->
  <rect x="0" y="625" width="1200" height="3" fill="url(#accent)"/>
</svg>
